# Language setting (ru, en, de, etc.)
language: en

# Default message when no duty role is configured
default-access-message: "&cYour role is not configured."

# Admins display format
admins-list-format: "%status% %name% [%rank%&r] – %duty%"
hide-format: "&kHidden&f"

# !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
# !!                          WARNING                             !!
# !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
# ! The group specified in 'to-group' MUST be created MANUALLY     !
# ! in LuckPerms before using this configuration!                  !
# !                                                                !
# ! This plugin ONLY provides the ability to toggle between:       !
# !  - Player's default group (from LuckPerms)                     !
# !  - The duty group specified in 'to-group'                      !
# !                                                                !
# ! It does NOT automatically create groups or manage permissions! !
# !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
duty-levels:

  helper:
    to-group: helper
    rank-name: "&7Helper"
    priority: 1
    join-message: "&aYou started duty as Helper"
    leave-message: "&cYou left Helper duty"

  moderator:
    to-group: moderator
    rank-name: "&aModerator"
    priority: 2
    join-message: "&aYou started duty as Moderator"
    leave-message: "&cYou left Moderator duty"
  
  admin:
    to-group: admin
    rank-name: "&cAdministrator"
    priority: 3
    join-message: "&aYou started duty as Administrator"
    leave-message: "&cYou left Administrator duty"
  
  senior:
    to-group: senior
    rank-name: "&6Senior Admin"
    priority: 4
    join-message: "&aYou started duty as Senior Administrator"
    leave-message: "&cYou left Senior Administrator duty"
  
  head:
    to-group: head
    rank-name: "&4Head Admin"
    priority: 5
    join-message: "&aYou started duty as Head Administrator"
    leave-message: "&cYou left Head Administrator duty"