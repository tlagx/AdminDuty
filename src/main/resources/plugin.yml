name: UnsubDuty
main: com.tlagx.unsubduty.UnsubDuty
version: 1.5.2.4
author: tlagx
description: Duty system plugin for Bukkit servers with flexible configuration

api-version: 1.13

commands:
  alogin:
    description: Toggle duty status for admin login
    usage: /alogin
    permission: unsubduty.use
  admins:
    description: List all duty admins with their status
    usage: /admins
    permission: unsubduty.view
  ahide:
    description: Toggle admin hide/show status
    usage: /ahide
    permission: unsubduty.hide
  duty:
    description: Duty management commands
    usage: /duty <set|roles>
    permission: unsubduty.admin
    aliases: [duty]

permissions:
  unsubduty.use:
    description: Allows using /alogin command
    default: true
  unsubduty.view:
    description: Allows viewing admin list and duty notifications
    default: true
  unsubduty.hide:
    description: Allows hiding/showing admin status
    default: op
  unsubduty.see-hidden:
    description: Allows seeing hidden admin names
    default: op
  unsubduty.admin:
    description: Allows admin commands like /duty set and /duty roles
    default: op
